---
# Gateway-arr Homepage Configuration
# Services are managed via Widget CRDs - this config handles UI settings only
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-arr-homepage-config
  labels:
    app.kubernetes.io/name: gateway-arr
    app.kubernetes.io/component: homepage
data:
  # ==========================================================================
  # SETTINGS - UI appearance and behavior
  # ==========================================================================
  settings.yaml: |
    title: Talos Homelab Dashboard
    theme: dark
    color: slate
    cardBlur: sm
    headerStyle: boxed
    iconStyle: theme
    statusStyle: dot
    target: _blank

    # Category layout - order and display style
    # Categories are defined in Widget CRD labels: gateway.catalyst.io/category
    layout:
      Media Management:
        style: row
        columns: 3
      Download Clients:
        style: row
        columns: 2
      Media Servers:
        style: row
        columns: 3
      AI & LLM:
        style: row
        columns: 3
      Infrastructure:
        style: row
        columns: 3
      Monitoring:
        style: row
        columns: 3
      Kubernetes:
        style: row
        columns: 4
      VPN & Privacy:
        style: row
        columns: 3
      Home:
        style: row
        columns: 2

    quicklaunch:
      searchDescriptions: true
      showSearchSuggestions: true
      provider: duckduckgo

  # ==========================================================================
  # WIDGETS - Top bar info widgets
  # ==========================================================================
  widgets.yaml: |
    # Kubernetes cluster stats
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: Talos Cluster
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true

    # Greeting
    - greeting:
        text_size: 2xl
        text: Catalyst Homelab

    # Search
    - search:
        provider: [duckduckgo, google]
        focus: false
        showSearchSuggestions: true

    # Date/time
    - datetime:
        text_size: xl
        format:
          dateStyle: long
          timeStyle: short
          hour12: true

    # Weather
    - openmeteo:
        label: San Francisco
        latitude: 37.7749
        longitude: -122.4194
        timezone: America/Los_Angeles
        units: imperial

  # ==========================================================================
  # BOOKMARKS - Quick links (not managed by Widget CRDs)
  # ==========================================================================
  bookmarks.yaml: |
    - Quick Links:
        - GitHub:
            - icon: github.png
              href: https://github.com/TheBranchDriftCatalyst
        - Homelab Repo:
            - icon: github.png
              href: https://github.com/TheBranchDriftCatalyst/talos-homelab
        - Claude:
            - icon: https://www.anthropic.com/images/icons/apple-touch-icon.png
              href: https://claude.ai

    - Documentation:
        - Kubernetes:
            - icon: kubernetes.png
              href: https://kubernetes.io/docs/
        - Talos Linux:
            - icon: https://www.talos.dev/images/logo.svg
              href: https://www.talos.dev/
        - Homepage:
            - icon: homepage.png
              href: https://gethomepage.dev/
        - Cilium:
            - icon: https://raw.githubusercontent.com/walkxcode/dashboard-icons/main/png/cilium.png
              href: https://docs.cilium.io/

    - DevOps:
        - ArgoCD:
            - icon: argocd.png
              href: https://argo-cd.readthedocs.io/
        - Flux:
            - icon: https://raw.githubusercontent.com/walkxcode/dashboard-icons/main/png/flux-cd.png
              href: https://fluxcd.io/docs/
        - Traefik:
            - icon: traefik.png
              href: https://doc.traefik.io/traefik/

  # ==========================================================================
  # KUBERNETES - Enable cluster mode
  # ==========================================================================
  kubernetes.yaml: |
    mode: cluster

  # ==========================================================================
  # SERVICES - Managed by Gateway-arr Widget CRDs
  # ==========================================================================
  services.yaml: |
    # Services are fetched from Gateway-arr API via GATEWAY_ARR_ENABLED=true
    # Widget CRDs in the cluster define all services dynamically
    []

  docker.yaml: |
    # Not used - all containers run in Kubernetes
