apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-arr-homepage
  labels:
    app.kubernetes.io/name: gateway-arr
    app.kubernetes.io/component: homepage
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gateway-arr
      app.kubernetes.io/component: homepage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gateway-arr
        app.kubernetes.io/component: homepage
    spec:
      # Init container copies config from ConfigMap to writable emptyDir
      initContainers:
        - name: copy-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              cp /config-source/* /app/config/
              mkdir -p /app/config/logs
              chmod -R 777 /app/config
          volumeMounts:
            - name: config-source
              mountPath: /config-source
            - name: config
              mountPath: /app/config
      containers:
        - name: homepage
          image: ghcr.io/thebranchdriftcatalyst/gateway-arr-homepage:latest
          imagePullPolicy: Always
          env:
            - name: GATEWAY_ARR_ENABLED
              value: "true"
            - name: GATEWAY_ARR_API
              value: "http://gateway-arr-api.gateway-arr.svc.cluster.local:8082"
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: "*"
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/healthcheck
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/healthcheck
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 128Mi
          volumeMounts:
            - name: config
              mountPath: /app/config
      volumes:
        # ConfigMap with settings, widgets, bookmarks
        - name: config-source
          configMap:
            name: gateway-arr-homepage-config
        # Writable config directory
        - name: config
          emptyDir: {}
      imagePullSecrets:
        - name: ghcr-secret
