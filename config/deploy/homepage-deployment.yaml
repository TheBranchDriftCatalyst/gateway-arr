apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-arr-homepage
  labels:
    app.kubernetes.io/name: gateway-arr
    app.kubernetes.io/component: homepage
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gateway-arr
      app.kubernetes.io/component: homepage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gateway-arr
        app.kubernetes.io/component: homepage
    spec:
      serviceAccountName: gateway-arr-homepage
      # Init container copies config from ConfigMap to writable emptyDir
      initContainers:
        - name: copy-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              # Copy static config (settings, widgets, bookmarks)
              cp /config-source/* /app/config/
              # Copy dynamic services from controller-generated ConfigMap
              if [ -f /services-source/services.yaml ]; then
                cp /services-source/services.yaml /app/config/services.yaml
              fi
              mkdir -p /app/config/logs
              chmod -R 777 /app/config
          volumeMounts:
            - name: config-source
              mountPath: /config-source
            - name: services-source
              mountPath: /services-source
            - name: config
              mountPath: /app/config
      containers:
        - name: homepage
          image: ghcr.io/thebranchdriftcatalyst/gateway-arr-homepage:latest
          imagePullPolicy: Always
          env:
            # Disabled - services come from file-based services.yaml generated by controller
            # - name: GATEWAY_ARR_ENABLED
            #   value: "true"
            # - name: GATEWAY_ARR_API
            #   value: "http://gateway-arr-api.gateway-arr.svc.cluster.local:8082"
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: "*"
            # API Keys from arr-stack-secrets
            - name: HOMEPAGE_VAR_MEDIA_SONARR_APIKEY
              valueFrom:
                secretKeyRef:
                  name: arr-stack-secrets
                  key: sonarr-api-key
                  optional: true
            - name: HOMEPAGE_VAR_MEDIA_RADARR_APIKEY
              valueFrom:
                secretKeyRef:
                  name: arr-stack-secrets
                  key: radarr-api-key
                  optional: true
            - name: HOMEPAGE_VAR_MEDIA_PROWLARR_APIKEY
              valueFrom:
                secretKeyRef:
                  name: arr-stack-secrets
                  key: prowlarr-api-key
                  optional: true
            - name: HOMEPAGE_VAR_MEDIA_JELLYFIN_APIKEY
              valueFrom:
                secretKeyRef:
                  name: arr-stack-secrets
                  key: jellyfin-api-key
                  optional: true
            - name: HOMEPAGE_VAR_MEDIA_OVERSEERR_APIKEY
              valueFrom:
                secretKeyRef:
                  name: arr-stack-secrets
                  key: overseerr-api-key
                  optional: true
            - name: HOMEPAGE_VAR_MEDIA_SABNZBD_APIKEY
              valueFrom:
                secretKeyRef:
                  name: arr-stack-secrets
                  key: sabnzbd-api-key
                  optional: true
            # Plex credentials
            - name: HOMEPAGE_VAR_MEDIA_PLEX_APIKEY
              valueFrom:
                secretKeyRef:
                  name: homepage-plex-credentials
                  key: PLEX_TOKEN
                  optional: true
            # Grafana credentials
            - name: HOMEPAGE_VAR_MONITORING_GRAFANA_USERNAME
              valueFrom:
                secretKeyRef:
                  name: homepage-grafana-credentials
                  key: GRAFANA_USER
                  optional: true
            - name: HOMEPAGE_VAR_MONITORING_GRAFANA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: homepage-grafana-credentials
                  key: GRAFANA_PASS
                  optional: true
            # Tautulli credentials
            - name: HOMEPAGE_VAR_MEDIA_TAUTULLI_APIKEY
              valueFrom:
                secretKeyRef:
                  name: homepage-tautulli-credentials
                  key: TAUTULLI_APIKEY
                  optional: true
            # qBittorrent credentials
            - name: HOMEPAGE_VAR_MEDIA_QBITTORRENT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: homepage-qbittorrent-credentials
                  key: QBITTORRENT_USER
                  optional: true
            - name: HOMEPAGE_VAR_MEDIA_QBITTORRENT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: homepage-qbittorrent-credentials
                  key: QBITTORRENT_PASS
                  optional: true
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/healthcheck
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /api/healthcheck
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            limits:
              cpu: 1000m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /app/config
      volumes:
        # ConfigMap with settings, widgets, bookmarks (static)
        - name: config-source
          configMap:
            name: gateway-arr-homepage-config
        # ConfigMap with services.yaml (dynamic, controller-generated)
        - name: services-source
          configMap:
            name: homepage-services
            optional: true
        # Writable config directory
        - name: config
          emptyDir: {}
      imagePullSecrets:
        - name: ghcr-secret
