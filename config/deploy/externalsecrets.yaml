---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: homepage-plex-credentials
  namespace: gateway-arr
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: homepage-plex-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      data:
        PLEX_TOKEN: "{{ .plex_token }}"
  data:
    - secretKey: plex_token
      remoteRef:
        key: plex-token
        property: password
