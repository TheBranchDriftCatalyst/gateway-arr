apiVersion: v1
kind: Service
metadata:
  name: gateway-arr-homepage
  labels:
    app.kubernetes.io/name: gateway-arr
    app.kubernetes.io/component: homepage
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
  selector:
    app.kubernetes.io/name: gateway-arr
    app.kubernetes.io/component: homepage
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: gateway-arr-homepage
  labels:
    app.kubernetes.io/name: gateway-arr
    app.kubernetes.io/component: homepage
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`gateway-ui.talos00`)
      services:
        - name: gateway-arr-homepage
          port: 3000
