---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: gateway-arr-manager-role
rules:
  # Widget CRD permissions
  - apiGroups:
      - gateway.catalyst.io
    resources:
      - widgets
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - gateway.catalyst.io
    resources:
      - widgets/status
    verbs:
      - get
      - update
      - patch
  - apiGroups:
      - gateway.catalyst.io
    resources:
      - widgets/finalizers
    verbs:
      - update
  # ConfigMap permissions for Homepage
  - apiGroups:
      - ""
    resources:
      - configmaps
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
  # Secret read for credentials
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: gateway-arr-manager-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: gateway-arr-manager-role
subjects:
  - kind: ServiceAccount
    name: gateway-arr-controller-manager
    namespace: gateway-arr
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gateway-arr-controller-manager
  namespace: gateway-arr
