---
apiVersion: gateway.catalyst.io/v1alpha1
kind: Widget
metadata:
  name: sonarr
  namespace: media
  labels:
    gateway.catalyst.io/category: "Media Management"
    gateway.catalyst.io/order: "1"
spec:
  displayName: Sonarr
  description: TV Series Management
  icon: sonarr.png
  href: http://sonarr.talos00
  internalUrl: http://sonarr.media.svc.cluster.local:8989
  siteMonitor:
    enabled: true
    path: /api/health
  widget:
    type: sonarr
    enableQueue: true
    credentials:
      apiKeySecretRef:
        name: sonarr-credentials
        key: api-key
  nav:
    showInOverlay: true
    shortcut: "s"
